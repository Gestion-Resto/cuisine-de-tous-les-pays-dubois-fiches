      '<div class="ri" style="margin-top:12px;"><span class="rl">💸 COÛT TOTAL INGRÉDIENTS :</span><span class="rv" id="totalIngCost">0.00 €</span></div>' +
    '</div>' +

    '<div class="card"><div class="clabel">📋 FAÇONNAGE & CUISSON (d\'après Dubois)</div>'+stepsHtml+'</div>' +

    '<div class="two-col">' +
      '<div class="card"><div class="clabel">⚙️ Équipements essentiels</div><div class="tags-row">'+equipHtml+'</div></div>' +
      '<div class="card"><div class="clabel">⚠️ Allergènes & traçabilité</div><div class="tags-row">'+allergHtml+'</div></div>' +
    '</div>' +

    '<div class="card"><div class="clabel">🍽️ Présentation & conseil de Dubois</div>' +
      '<p style="font-size:13px;line-height:1.7;">La limpidité et la chaleur sont les deux exigences absolues du potage selon Dubois. Toujours servir les potages dans des soupières ou tasses préchauffées.</p>' +
      notaText +
    '</div>' +

    '<div class="card"><div class="clabel">🧼 HACCP / PMS — Recommandations</div>' +
      '<p style="font-size:12px;line-height:1.7;">• Températures de service : potages chauds à 75°C minimum.<br>• Refroidissement rapide (0–3°C en moins de 2h) si préparation anticipée.<br>• Consommé à base de viandes : traçabilité fournisseur obligatoire.</p>' +
    '</div>' +

    '<div class="two-col">' +
      '<div class="card"><div class="clabel">🌱 Impact environnemental (par portion)</div>' +
        '<div><span style="font-size:12px;">Empreinte <strong>'+envLabel+'</strong></span>' +
        '<div class="env-bar"><div style="height:100%;width:'+item.env+'%;background:'+envColor+';border-radius:4px;"></div></div>' +
        '<div style="display:flex;gap:1rem;margin-top:6px;font-size:11px;color:var(--text2);font-family:sans-serif;"><span>🌍 CO₂ : '+item.co2+'</span><span>💧 Eau : '+item.eau+'</span></div></div>' +
      '</div>' +
      '<div class="card"><div class="clabel">🍞 Valeurs nutritionnelles (par portion)</div>' +
        '<div class="nut-grid">' +
          '<div class="nc"><div class="nv">'+item.nut.kcal+'</div><div class="nl">kcal</div></div>' +
          '<div class="nc"><div class="nv">'+item.nut.prot+' g</div><div class="nl">Protéines</div></div>' +
          '<div class="nc"><div class="nv">'+item.nut.lip+' g</div><div class="nl">Lipides</div></div>' +
          '<div class="nc"><div class="nv">'+item.nut.glu+' g</div><div class="nl">Glucides</div></div>' +
        '</div>' +
      '</div>' +
    '</div>';
}

function attachDOMReferences() {
  prepInput = document.getElementById('prepTime');
  cookInput = document.getElementById('cookTime');
  dressInput = document.getElementById('dressTime');
  autoCheckbox = document.getElementById('autoTimesCheckbox');
  portionsInput = document.getElementById('portionsInput');
  coeffInput = document.getElementById('coeffInput');
  portionLabel = document.getElementById('portionLabel');
  qtyLabels = document.querySelectorAll('.qtyBaseLabel');
  totalCostSpan = document.getElementById('totalCostValue');
  costPerPortionSpan = document.getElementById('costPerPortion');
  sellingPriceSpan = document.getElementById('sellingPriceValue');
  marginPercentSpan = document.getElementById('marginPercent');
  totalIngCostSpan = document.getElementById('totalIngCost');
  marginBar = document.getElementById('marginBar');
  tbody = document.getElementById('ingredientTbody');
}

function renderIngredientTable() {
  if(!tbody) return;
  tbody.innerHTML = '';
  for(var i = 0; i < ingredientsData.length; i++) {
    var ing = ingredientsData[i];
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td style="font-weight:600">'+escHtml(ing.name)+'</td>' +
      '<td><input type="number" class="ni qty" data-idx="'+i+'" value="'+ing.qty.toFixed(3)+'" step="0.001" style="width:90px;"> <span style="font-size:11px;color:var(--text2)">'+escHtml(ing.unit)+'</span></td>' +
      '<td style="font-size:11px;color:var(--text2)">'+escHtml(ing.unit)+'</td>' +
      '<td><input type="number" class="ni prix" data-idx="'+i+'" value="'+ing.priceUnit.toFixed(2)+'" step="0.10" style="width:80px;"></td>' +
      '<td class="line-total" style="text-align:right;font-weight:600">'+( ing.qty * ing.priceUnit).toFixed(2)+' €</td>';
    tbody.appendChild(tr);
    (function(idx){
      tr.querySelector('.qty').addEventListener('input', function(){ updateFromInputs(); });
      tr.querySelector('.prix').addEventListener('input', function(){ updateFromInputs(); });
    })(i);
  }
}

function updateFromInputs() {
  var rows = tbody.querySelectorAll('tr');
  for(var i = 0; i < rows.length; i++) {
    var qty = parseFloat(rows[i].querySelector('.qty').value) || 0;
    var price = parseFloat(rows[i].querySelector('.prix').value) || 0;
    ingredientsData[i].qty = qty;
    ingredientsData[i].priceUnit = price;
    rows[i].querySelector('.line-total').innerText = (qty * price).toFixed(2) + ' €';
  }
  updateAllCosts();
}

function updateAllCosts() {
  var total = 0;
  for(var i = 0; i < ingredientsData.length; i++) total += ingredientsData[i].qty * ingredientsData[i].priceUnit;
  var costPer = total / currentPortions;
  var pvTotal = costPer * coeffVente * currentPortions;
  var margin = pvTotal > 0 ? (pvTotal - total) / pvTotal * 100 : 0;
  if(totalCostSpan) totalCostSpan.innerText = total.toFixed(2) + ' €';
  if(costPerPortionSpan) costPerPortionSpan.innerText = costPer.toFixed(2) + ' €';
  if(sellingPriceSpan) sellingPriceSpan.innerText = pvTotal.toFixed(2) + ' €';
  if(marginPercentSpan) marginPercentSpan.innerText = margin.toFixed(1) + '%';
  if(totalIngCostSpan) totalIngCostSpan.innerText = total.toFixed(2) + ' €';
  if(marginBar) {
    var w = Math.min(100, Math.max(0, margin));
    marginBar.style.width = w + '%';
    marginBar.style.background = margin > 65 ? '#2d9e6b' : (margin > 40 ? '#c9a14a' : '#c94a1c');
  }
}

function applyAutoTimes() {
  if(!autoTimes) return;
  var ratio = currentPortions / 6;
  currentPrepRaw = Math.round(defaultPrep * ratio);
  currentDressRaw = Math.round(defaultDress * ratio);
  syncTimesToUI();
}

function syncTimesToUI() {
  if(prepInput) prepInput.value = formatDuration(currentPrepRaw);
  if(dressInput) dressInput.value = formatDuration(currentDressRaw);
  if(cookInput) cookInput.value = currentCookRaw;
}

function syncTimesFromUI() {
  if(prepInput) { var m = parseDurationToMinutes(prepInput.value); currentPrepRaw = isNaN(m) ? (parseInt(prepInput.value)||0) : m; }
  if(dressInput) { var m2 = parseDurationToMinutes(dressInput.value); currentDressRaw = isNaN(m2) ? (parseInt(dressInput.value)||0) : m2; }
  if(cookInput) currentCookRaw = cookInput.value;
}

function updateQuantitiesByPortions() {
  var factor = currentPortions / 6;
  for(var i = 0; i < ingredientsData.length; i++) {
    ingredientsData[i].qty = defaultIngredients[i].defaultQty * factor;
  }
  renderIngredientTable();
  updateAllCosts();
}

function bindEvents() {
  if(portionsInput) portionsInput.addEventListener('input', function() {
    currentPortions = parseInt(portionsInput.value) || 1;
    if(portionLabel) portionLabel.innerText = currentPortions;
    qtyLabels = document.querySelectorAll('.qtyBaseLabel');
    qtyLabels.forEach(function(lbl){ lbl.innerText = currentPortions; });
    updateQuantitiesByPortions();
    if(autoTimes) applyAutoTimes();
  });
  if(coeffInput) coeffInput.addEventListener('input', function() {
    coeffVente = parseFloat(coeffInput.value) || 3.0;
    updateAllCosts();
  });
  if(autoCheckbox) autoCheckbox.addEventListener('change', function() {
    autoTimes = autoCheckbox.checked;
    if(autoTimes) applyAutoTimes();
  });
  if(prepInput) prepInput.addEventListener('input', function() { syncTimesFromUI(); if(autoTimes){ autoCheckbox.checked = false; autoTimes = false; } });
  if(cookInput) cookInput.addEventListener('input', function() { syncTimesFromUI(); if(autoTimes){ autoCheckbox.checked = false; autoTimes = false; } });
  if(dressInput) dressInput.addEventListener('input', function() { syncTimesFromUI(); if(autoTimes){ autoCheckbox.checked = false; autoTimes = false; } });
}

function loadItem(itemId) {
  var item = null;
  for(var i = 0; i < itemsData.length; i++) { if(itemsData[i].id === itemId) { item = itemsData[i]; break; } }
  if(!item) return;
  currentItemId = itemId;
  defaultPrep = item.prepBase; defaultDress = item.dressBase;
  currentPrepRaw = item.prepBase; currentCookRaw = item.cookBase.toString(); currentDressRaw = item.dressBase;
  autoTimes = true;
  ingredientsData = item.ingredients.map(function(ing){ return {name:ing.name, unit:ing.unit, qty:ing.defaultQty, priceUnit:ing.defaultPrice}; });
  defaultIngredients = item.ingredients.slice();
  currentPortions = 6; coeffVente = 3.5;
  ficheContainer = document.getElementById('ficheContainer');
  ficheContainer.id = 'fiche-' + item.id;
  ficheContainer.innerHTML = generateFicheHTML(item);
  attachDOMReferences();
  renderIngredientTable();
  updateAllCosts();
  if(autoTimes) applyAutoTimes();
  bindEvents();
  if(autoCheckbox) autoCheckbox.checked = true;
}

document.addEventListener('DOMContentLoaded', function() {
  var select = document.getElementById('itemSelect');
  for(var i = 0; i < itemsData.length; i++) {
    var item = itemsData[i];
    var option = document.createElement('option');
    option.value = item.id;
    option.textContent = item.nom + ' (p. ' + item.page + ')';
    select.appendChild(option);
  }
  select.addEventListener('change', function(e){ loadItem(e.target.value); });
  var hash = window.location.hash.replace('#fiche-', '');
  var targetId = (hash && itemsData.find(function(it){ return it.id === hash; })) ? hash : itemsData[0].id;
  select.value = targetId;
  loadItem(targetId);
});

})();
</script>
</body>
